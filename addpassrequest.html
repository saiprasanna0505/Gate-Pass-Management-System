{% load  static%}
<!DOCTYPE HTML>
<html>

<head>
<title>Voidmain</title>
<link rel="stylesheet" type="text/css" href="{% static 'style/style.css'%}" title="style" />
</head>

<body>
	<div id="main">
		<div id="header">
			<div id="logo">
				<div id="logo_text">
					<!-- class="logo_colour", allows you to change the colour of the text -->
					<h3>
						<div align="center">
                            <a href="#"><font color="white">DIGITAL OUT PASS MANAGEMENT SYSTEM</font></a>
                        </div>
					</h3>
					<br/><br/>
				</div>
			</div>
			<div id="menubar">
				<ul id="menu">

                   {% if request.session.role in "student" %}
						<li><a href="/addpassrequest">Send Request</a></li>
					{% endif %}

                    <li><a href="/getpassrequests">Get Pass Requests</a></li>

                    <li><a href="/logout">logout</a></li>

				</ul>
			</div>
		</div>
		<div id="content_header"></div>
		<div id="site_content">
			<div id="content">

				<h1>Send Request: {{message}}</h1>

				<form name="form" action="/addpassrequestaction/" method="post">
					{% csrf_token %}
					<div class="form_settings">

						<p>
							<span>Time:</span><input class="contact" type="time" name="time" value="" required/>
						</p>

						<p>
							<span>Enter Reason:</span><input class="contact" type="text" name="reason" value="" required/>
						</p>

						<p style="padding-top: 15px">
							<span>&nbsp;</span><input class="submit" type="submit"
								name="contact_submitted" value="Send Request" />
						</p>

					</div>
				</form>

			</div>
		</div>
	</div>
</body>
</html>
